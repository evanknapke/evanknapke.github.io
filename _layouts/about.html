<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" type="text/css" href="{{ "/assets/css/page.css?v=" | append: site.github.build_revision | relative_url }}">

    <!-- Hamburger menu icon -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- For Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="navbar">
          <ul>
            <li><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></li>
            <li><a class="hamburger-icon" onclick="openNav()"><i class="material-icons">dehaze</i></a></li>
            <li><a class="nav-item" href="/about/">About</a></li>
            <li><a class="nav-item" href="/education/">Education</a></li>
            <li><a class="nav-item" href="/experience/">Work Experience</a></li>
            <li><a class="nav-item" href="/projects/">Projects</a></li>
            <li><a class="nav-item" href="/">Home</a></li>
          </ul>
          
          <div id="mySidenav" class="sidenav">
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
            <a class="nav-item" href="/about/">About</a>
            <a class="nav-item" href="/education/">Education</a>
            <a class="nav-item" href="/experience/">Work Experience</a>
            <a class="nav-item" href="/projects/">Projects</a>
            <a class="nav-item" href="/">Home</a>
          </div>
          
        </div>
      </header>
      <div class="container">
        <div class="child">
          <br>
          <div class="icon-bar">
            <a href="https://www.linkedin.com/in/evanknapke/" target="_blank" class="linkedin"><i class="fa fa-linkedin"></i></a>
            <a href="https://github.com/evanknapke" target="_blank" class="github"><i class="fa fa-github"></i></a>
          </div>
          <br>
          <br>
          {% if site.logo %}
            <img src="{{site.logo | relative_url}}" alt="Logo" />
          {% endif %}
          <br>
          <p>{{ content }}</p>
        </div>

      </div>

    </div>
    <script src="{{ "/assets/js/script.js" | relative_url }}"></script>
  </body>
</html>
